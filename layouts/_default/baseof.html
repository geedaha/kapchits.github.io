<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
  <head>
    <meta charset="utf-8">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body { margin:0; font-family:'Roboto', sans-serif; color:#333; }
      .container { max-width: 800px; margin: 0 auto; padding: 1rem; text-align: center; }
      .lang-switch { margin-bottom:1rem; }
      .lang-switch a { margin:0 .5rem; text-decoration:none; color:#555; }
      .lang-switch a.current { font-weight:bold; }
      .hero-img { max-width:200px; border-radius:8px; }
      .title { font-size:2rem; margin-top:.5rem; }
      .subtitle { margin:.5rem 0 1.5rem; color:#666; }
      .divider { border:none; border-top:1px solid #ccc; margin:2rem 0; }
      .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; text-transform:uppercase; font-weight:500; }
      .grid a { text-decoration:none; color:#333; }
      .footer { margin-top:2rem; font-size:.875rem; color:#888; }
      .footer a { color:#888; text-decoration:none; margin:0 .5rem; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="lang-switch">
        {{ range .Site.Languages }}
          {{ $code := .Lang }}
          <a href="{{ $.Site.BaseURL }}{{ $code }}/" class="{{ if eq $.Site.Language.Lang $code }}current{{ end }}">{{ upper $code }}</a>
        {{ end }}
      </div>
      <img src="{{ "images/kapchits.jpg" | relURL }}" alt="Professor Kapchits" class="hero-img">
      <h1 class="title">{{ .Site.Title }}</h1>
      <p class="subtitle">{{ i18n "homepageSubtitle" }}</p>
      <hr class="divider">
      <div class="grid">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      </div>
      <hr class="divider">
      <div class="footer">
        © {{ now.Format "2006" }} {{ .Site.Title }}
        <a href="{{ "/privacy/" | relURL }}">Privacy</a>
        <a href="{{ "/contact/" | relURL }}">Contact</a>
      </div>
    </div>
  </body>
</html>
