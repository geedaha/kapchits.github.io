<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>{{ .Site.Title }}</title></head>
<body>
  <h1>{{ .Site.Title }}</h1>
  <main>
    {{ .Content }}
    {{ range .Pages }}
      <article><h2><a href='{{ .RelPermalink }}'>{{ .Title }}</a></h2></article>
    {{ end }}
  </main>
  <footer>? {{ now.Format "2006" }} {{ .Site.Title }}</footer>
</body>
</html>
